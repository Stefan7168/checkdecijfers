# Dependency alerts + update PRs (Phase 0 ops guardrail, docs/03-mvp-scope.md:
# "automated dependency alerts"). Dependabot opens PRs for outdated/vulnerable
# npm packages and GitHub Actions. These are the ONE sanctioned exception to the
# build-phase "commit straight to main, no PRs" rule (CLAUDE.md): dependency
# bumps must be reviewed before merging, never blind-merged. Grouped + weekly to
# keep the noise low for a solo owner.
#
# Note: this file enables *version-update* PRs. Dependabot *security* alerts
# (vulnerability notifications) are a separate repo toggle the owner enables once
# under Settings -> Code security -> "Dependabot alerts" (docs/RUNBOOK.md).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # One grouped PR per week for all npm updates, instead of one per package.
      npm-all:
        patterns:
          - "*"
    ignore:
      # TypeScript >= 6/7 (the native-compiler line) breaks `next build`'s
      # TypeScript step on Next 16.x ("required package(s) not installed",
      # 2026-07-17 deploy failure on main after PR #53). Pinned back to ^5 in
      # BOTH package.json files — one compiler version validating src/ (web
      # checks it too, through the web/backend symlink). Remove this ignore
      # (and web/'s) together, only after Next's release notes state TS-7
      # support and a real `next build` proves it.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"

  # web/ (the chat UI, ADR 018) is its own independent npm project — its own
  # package-lock.json, not covered by the root entry above.
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-web-all:
        patterns:
          - "*"
    ignore:
      # Same TS-major hold as the root entry above — remove both together.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps(web)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
