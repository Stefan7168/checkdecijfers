# CI gate — the owner's trust signal. "The tests pass" is a claim only CI can make
# (CLAUDE.md conventions). Runs the three gate suites on every push:
#   1. ingestion fixture tests   2. invariant tests   3. benchmark suite + scorer
# State per work package: the ingestion suite has real teeth since WP2 (wire-level
# corruption fixtures against an embedded Postgres, ADR 009); the invariant and
# benchmark suites remain honest scaffolds (todo-marked obligations plus real
# doc-consistency tests) that gain teeth with their work packages; the scorer
# refuses to report scores until the answer key freezes.
# Deploy-blocking on red attaches when Vercel is connected (later Phase 0 session).
# This workflow is hermetic: no secrets, no network beyond npm — which is why the
# ingestion tests run on PGlite (ADR 009), never against Supabase.
name: CI

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Ingestion fixture tests
        run: npm run test:ingestion
      - name: Invariant tests
        run: npm run test:invariants
      - name: Benchmark structure tests
        run: npm run test:benchmark
      - name: Benchmark scorer
        run: npm run benchmark:score
