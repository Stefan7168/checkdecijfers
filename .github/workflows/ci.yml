# CI gate — the owner's trust signal. "The tests pass" is a claim only CI can make
# (CLAUDE.md conventions). Runs the eight gate suites + the benchmark run/score
# pair on every push:
#   1. ingestion fixture tests   2. invariant tests   3. benchmark suite
#   4. registry tests (ADR 010)  5. query + benchmark-intent tests (WP5)
#   6. answer/intent tests (WP6) — the parser's LLM calls replay from committed
#      fixtures (ADR 012): still no API key, no network. The live half
#      (recording + calibration, npm run intent:eval) spends tokens and is
#      deliberately NOT on this gate.
#   7. chart tests (WP8) — spec builder + dumb SVG renderer, no LLM anywhere.
#   8. audit-record tests (WP10, R8) — every response writes a row that
#      reconstructs it; fail-closed when the audit store is down (ADR 016).
#   9. benchmark run + scorer (WP10): run-benchmark drives all 20 docs/02
#      tasks (+ the B15/B16 reply rounds + the un-disambiguated B3/B5
#      variants) through the AUDITED pipeline hermetically and dumps the audit
#      records; score-benchmark scores those records against the frozen key
#      (docs/03 gate: >=12/14 answerable, 6/6 refusal, zero fabricated
#      numbers) and fails the push below the gate. In CI a missing dump is a
#      failure — the gate may not silently degrade to structure-only.
# State per work package: the ingestion suite has real teeth since WP2 (wire-level
# corruption fixtures against an embedded Postgres, ADR 009); the registry suite
# (WP4) checks default_coordinates/period_semantics/canonical_measures apply
# idempotently and cross-checks canonical picks against the frozen answer key;
# since WP5 the query suite scores benchmark tasks B1-B14 against the frozen
# answer key (WP3) through the deterministic query layer using hand-authored
# structured intents, plus the B20 freshness refusal — all hermetic; since WP7
# the answer suite ALSO drives B1-B14 end-to-end (docs/02 phrasing → parser →
# query → composed Dutch answer, both LLM calls replayed from committed
# fixtures — ADR 012/013) and the invariant suite has real answer-side tests
# for R1/R2/R3/R4/R5/R9/R10/R11; since WP8 R6 is real (chart suite: B4/B8 line
# charts against the frozen key, spec determinism, renderer provenance); since
# WP10 R8 is real and the invariant suite carries ZERO todos — all eleven
# invariants are tested.
# WP12 (ADR 018): the chat UI (`web/`) adds two hermetic gate steps — its own
# typecheck and its own component test suite (jsdom, no network) — plus a
# second job, `deploy`, gated on `gate` via `needs:` so a red gate structurally
# blocks the deploy. `deploy` runs only on a direct push to main (this repo has
# no PRs/branch protection — CLAUDE.md, deliberate — so a `needs:` dependency
# is the only real deploy-blocking mechanism available). It is intentionally
# NOT hermetic: it calls the real Vercel CLI/API. The Vercel project has no
# git integration connected, so this job is the only thing that ever deploys —
# nothing races it.
# `web/` is deliberately its OWN independent npm project — its own
# package-lock.json, its own `npm ci` step here — not an npm workspace member
# of the root. This was a mid-session revision (ADR 018 point 9): a shared
# workspace lockfile repeatedly fought Vercel/Turbopack's assumption that a
# deployed Next.js app's node_modules are self-contained, causing two failed
# real deploy attempts before this fix. `web/backend` (a symlink to `../src`)
# is how it still reaches backend source code with zero package-level coupling.
# This workflow's `gate` job is hermetic: no secrets, no network beyond npm —
# which is why the ingestion tests run on PGlite (ADR 009), never against
# Supabase, and why `gate` runs `web`'s typecheck/tests but not `next build`
# (which fetches fonts over the network at build time; that only happens
# inside `deploy`'s `vercel build`, downstream of a green gate).
name: CI

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Ingestion fixture tests
        run: npm run test:ingestion
      - name: Invariant tests
        run: npm run test:invariants
      - name: Benchmark structure tests
        run: npm run test:benchmark
      - name: Registry tests
        run: npm run test:registry
      - name: Query + benchmark-intent tests
        run: npm run test:query
      - name: Answer/intent tests (LLM replay fixtures)
        run: npm run test:answer
      - name: Chart tests (spec builder + dumb renderer)
        run: npm run test:chart
      - name: Audit record tests (R8)
        run: npm run test:audit
      - name: Benchmark run (hermetic, audited pipeline)
        run: npm run benchmark:run
      - name: Benchmark scorer (audit records vs frozen key)
        run: npm run benchmark:score
      - name: Web app install (own, independent lockfile)
        run: npm run web:ci
      - name: Web app typecheck
        run: npm run web:typecheck
      - name: Web app tests (chart wrapper, jsdom, no network)
        run: npm run web:test

  deploy:
    needs: gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      # No project install step here: `vercel build` installs web/'s own
      # dependencies itself, from web/'s own package-lock.json.
      #
      # Commands run from the repo ROOT (no --cwd web) and rely entirely on
      # the Vercel PROJECT's own settings — rootDirectory: "web" plus
      # sourceFilesOutsideRootDirectory: true (Vercel's documented monorepo
      # mechanism, set via the API; no CLI equivalent exists) — to find the
      # app and still let it reach the web/backend symlink one level up.
      # `--cwd web` combined with a project-level rootDirectory double-applies
      # the subdirectory (a real, reproduced bug: ADR 018 point 9) — the two
      # are alternatives, never both.
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel project settings and env vars
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
